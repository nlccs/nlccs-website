intro_title: Nederlands Centrum voor Curriculumstudies
intro_body: NLCCS is een opleidings- en kennisinstituut voor schoolleiders en leraren, opgericht door Tjip de Jong, Sarah Bergsen en Erik Meester. Wij ontwikkelen en verzorgen in samenwerking met deskundige gastdocenten hoogwaardige leergangen, masterclasses en professionaliseringstrajecten op maat waarin wetenschappelijke inzichten worden geconcretiseerd naar kansrijke interventies, die zich elders ook al in de onderwijspraktijk bewezen hebben.
over_ons_title: Over ons
over_ons_body: |-
  Vakinhoud, professionaliteit en menselijke relatie zijn voor ons heel belangrijk. Dat betekent dat het tijdens onze bijeenkomsten echt altijd ergens over gaat, dat we steeds op zoek gaan naar manieren om ons eigen handelen te verbeteren en dat we zorgdragen voor een persoonlijke sfeer. We houden dus van theorie, maar hechten ook veel waarde aan de concrete vertaling van de theorie naar de praktijk. Tot slot is discipline voor ons een essentieel concept. Professionaliseren is een serieus proces, dat vraagt om serieuze toewijding en inzet, van zowel ons als docenten als onze cursisten. _No pain, no gain!_

  _De hoofddocenten zijn Tjip de Jong, Sarah Bergsen en Erik Meester. Wij werken graag samen met een grote diversiteit aan deskundige gastdocenten._
