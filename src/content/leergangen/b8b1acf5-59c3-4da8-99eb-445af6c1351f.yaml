intro: In deze leergang staat het schooleigen curriculum centraal. Hoe krijg je overzicht in de leerlijnen van basisvakken zoals lezen, schrijven, rekenen, wereldoriëntatie en gedrag? Hoe werkt leren en welke (vak)didactische principes zijn bekend over het aanleren van deze basiskennis en -vaardigheden?
sfeerfoto: /masterclasses/sfeer-1.avif
body: |-
  Je leert deze kennis toe te passen om de kwaliteit van het onderwijs en het didactisch handelen te analyseren en te duiden, en te vertalen naar concrete, onderbouwde en haalbare verbeteringen in didactiek, differentiatie, gedrag en curriculum.

  Daarnaast is er veel aandacht voor het realiseren van deze verbeteringen via een collectieve aanpak binnen de school. Je ontwikkelt je rol als onderwijskundig leider verder, reflecteert hierop en zorgt ervoor dat verbeteringen duurzaam worden geborgd in de schoolorganisatie.

  Ook incompany te organiseren.
