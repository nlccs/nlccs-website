body: |-
  Je leert deze kennis toe te passen om de kwaliteit van het onderwijs en het didactisch handelen te analyseren en te duiden, en te vertalen naar concrete, onderbouwde en haalbare verbeteringen in didactiek, differentiatie, gedrag en curriculum.

  Daarnaast is er veel aandacht voor het realiseren van deze verbeteringen via een collectieve aanpak binnen de school. Je ontwikkelt je rol als onderwijskundig leider verder, reflecteert hierop en zorgt ervoor dat verbeteringen duurzaam worden geborgd in de schoolorganisatie.

  ## **Bedoeling en doelen**

  ##  

  De bedoeling van dit herregistratieprogramma is dat schoolleiders na afronding beter in staat zijn om hun onderwijsaanbod voor de basisvakken doelgericht en wetenschappelijk onderbouwd te verbeteren, opdat de basiskennis- en vaardigheden van hun leerlingen aantoonbaar verbeteren.

  Programmadoelen:

  1.       De schoolleider begrijpt hoe leren werkt en kent de werkzame principes van effectief onderwijs binnen de domeinen gedrag, lezen, rekenen, wereldoriëntatie en taal, en kan deze kennis gebruiken om de kwaliteit van onderwijs en didactisch handelen te duiden en te onderbouwen.

  2.       De schoolleider kan op basis van onderwijskundige en vakdidactische kennis de kwaliteit, samenhang en effectiviteit van het onderwijs en curriculum analyseren, en deze analyse vertalen naar onderbouwde, haalbare en contextspecifieke verbeteringen in didactiek, differentiatie, gedrag en curriculum.

  3.       De schoolleider kan doelgericht sturen op de realisatie van onderwijsverbeteringen binnen het team, met aandacht voor collectieve aanpak, veranderbereidheid en professionele ontwikkeling, en kan daarbij passende leiderschapsinterventies inzetten.

  4.       De schoolleider ontwikkelt, expliciteert en reflecteert op de eigen rol als onderwijskundig leider en draagt actief bij aan duurzame verbetering en borging van onderwijskwaliteit binnen de schoolorganisatie.

