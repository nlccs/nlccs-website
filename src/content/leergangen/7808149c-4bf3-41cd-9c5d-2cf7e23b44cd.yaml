body: |-
  Je leert onder meer hoe je kunt omgaan met ideologische verschillen in je team, wat je kunt doen om meer wetenschappelijk geïnformeerd te werken en hoe je de organisatiestructuur zo inricht dat die professioneel verantwoordelijk gedrag stimuleert.

  Daarnaast gaan we dieper in op hoe je vanuit je rol als veranderkundig leider de optimale condities kunt creëren om curriculumontwikkelingen daadwerkelijk een goede kans van slagen te geven en vanuit nabijheid je team daarbij actief kunt ondersteunen.

  ## Bedoeling en doelen 

  De bedoeling van dit herregistratieprogramma is dat schoolleiders na afronding beter in staat zijn om leiding te geven aan schooleigen curriculumontwikkelingen, opdat de kans dat deze succesvol verlopen – dat wil zeggen: de leerlingen en/of leraren ten goede komen – zo groot mogelijk wordt.

  Programmadoelen

  1. De schoolleider begrijpt wat onder het schooleigen curriculum wordt verstaan en kan uitleggen hoe curriculumontwikkeling als gefaseerd en samenhangend proces vorm krijgt, inclusief het doel, de functie en de onderlinge samenhang van de verschillende ontwikkelfasen.
  2. De schoolleider kan het huidige schooleigen curriculum analyseren op basis van onderwijskundige, pedagogische, vakdidactische en cognitief-psychologische inzichten, en op grond daarvan een wetenschappelijk geïnformeerde en onderbouwde gewenste onderwijssituatie formuleren.
  3. De schoolleider kan een veranderkundig en gefaseerd implementatieplan ontwerpen waarin curriculumontwikkeling, professionalisering, organisatieontwikkeling en leiderschap samenkomen, en kan daarbij onderbouwen hoe monitoring, cultuur, samenwerking en persoonlijk leiderschap bijdragen aan duurzame onderwijsverbetering.
  4. De schoolleider ontwikkelt, expliciteert en reflecteert op de eigen rol als onderwijskundig leider en draagt actief bij aan duurzame verbetering en borging van onderwijskwaliteit binnen de schoolorganisatie.

  \*De verplichte literatuur ontvang je van ons tijdens de eerste bijeenkomst.

