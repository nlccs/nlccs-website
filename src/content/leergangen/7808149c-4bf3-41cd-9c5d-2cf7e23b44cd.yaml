intro: 'In deze leergang staat het proces van schooleigen curriculumontwikkeling centraal: hoe pak je dat op schoolniveau doordacht en op duurzame wijze aan? En waar moet je daarbij organisatorisch en veranderkundig allemaal rekening mee houden?'
sfeerfoto: /masterclasses/2.jpeg
body: |-
  Je leert onder meer hoe je kunt omgaan met ideologische verschillen in je team, wat je kunt doen om meer wetenschappelijk geïnformeerd te werken en hoe je de organisatiestructuur zo inricht dat die professioneel verantwoordelijk gedrag stimuleert.

  Daarnaast gaan we dieper in op hoe je vanuit je rol als veranderkundig leider de optimale condities kunt creëren om curriculumontwikkelingen daadwerkelijk een goede kans van slagen te geven en vanuit nabijheid je team daarbij actief kunt ondersteunen.

  Op aanvraag ook incompany te organiseren.
