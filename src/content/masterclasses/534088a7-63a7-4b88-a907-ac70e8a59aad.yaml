intro: In het Nederlandse onderwijslandschap zijn er grote ideologische verschillen ten aanzien van de bedoeling en inrichting van het primair onderwijs, maar waar iedereen het over eens lijkt te zijn is dat de huidige toetspraktijk moet veranderen. Wat is er mis met die toetspraktijk en hoe kan het beter? Dat is de centrale vraag waarop we in deze masterclass een geïnformeerd antwoord proberen te formuleren.
sfeerfoto: /masterclasses/KAREN-HEIJ-HEADER-2-1600x900-c-default.jpg
body: |-
  Hulp krijgen we van gastdocent dr. Karen Heij, toetsexpert en gepromoveerd op de eindtoets basisonderwijs bezien vanuit bestuurlijk perspectief. Deze masterclass wordt verder verzorgd door onze hoofddocenten Sarah Bergsen, Tjip de Jong & Erik Meester.

  ##### **Programmadoelen**

  ·       De schoolleider kan uitleggen hoe onjuiste interpretaties en toepassingen van onderwijsmatig toetsen kunnen leiden tot ongelijke onderwijskansen en tot het onvoldoende behalen van curriculumdoelen door leerlingen.

  ·       De schoolleider kan vanuit een theoretisch fundament en een gedragen onderwijsvisie richting geven aan onderwijsmatig toetsen, waarbij toetsing wordt verbonden met kennis over hoe leerlingen leren en met het uitgangspunt van mastery learning.

  ·       De schoolleider kan leidinggeven aan een gezamenlijk leerproces binnen de school dat uitmondt in concrete acties om belemmeringen voor onderwijsmatig toetsen weg te nemen, zodat toetsing doelgericht bijdraagt aan eerlijke leerkansen voor alle leerlingen.
