intro: In 2025 zijn de nieuwe kerndoelen voor het primair onderwijs gepubliceerd en vanaf 2031 verwacht de inspectie dat scholen daaraan 'voldoen'. Daarom organiseren we vanuit het Nederlands Centrum voor Curriculumstudies een speciale masterclass hierover.
sfeerfoto: /masterclasses/kerndoelen po plaatje.png
body: |-
  Tijdens deze dag formuleren we antwoorden op vragen zoals:

  - Wat kun - en moet - je nou eigenlijk (niet) met die kerndoelen? 
  - Welke boodschap gaat ervan uit/hoe moeten we ze duiden?
  - Hoe kun je de kerndoelen in historisch perspectief plaatsen?
  - Waarom geven ze het nationaal curriculum elders anders vorm?

  Na afloop van de masterclass ben je weer helemaal 'up to date' en kun je een verantwoord plan formuleren waarin je uiteenzet hoe je je met je eigen school tot de nieuwe kerndoelen wil gaan verhouden.

  Hulp krijgen we van gastdocent David Roelofs, leraar Nederlands en programmamaker bij Stichting Meer Leren Op School. Hij is voor deze stichting namelijk bezig met een heel interessant project: het vertalen/bewerken van het nieuwe Vlaamse curriculum naar de Nederlandse context. Deze masterclass wordt verder verzorgd door onze hoofddocenten Sarah Bergsen, Tjip de Jong & Erik Meester.

