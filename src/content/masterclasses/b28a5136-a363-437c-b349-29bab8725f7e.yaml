intro: In 2025 zijn de nieuwe kerndoelen voor het primair onderwijs gepubliceerd en vanaf 2031 verwacht de inspectie dat scholen daaraan voldoen. Maar wat kun je nou eigenlijk met die kerndoelen? Dat is de centrale vraag waarop we in deze masterclass een geïnformeerd antwoord proberen te formuleren.
sfeerfoto: /masterclasses/David_Roelofs_nne7mv.avif
body: Hulp krijgen we van gastdocent David Roelofs, leraar Nederlands en programmamaker bij Stichting Meer Leren Op School. Deze masterclass wordt verder verzorgd door onze hoofddocenten Sarah Bergsen, Tjip de Jong & Erik Meester.
