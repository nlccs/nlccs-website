intro: In 2025 zijn de nieuwe kerndoelen voor het primair onderwijs gepubliceerd en vanaf 2031 verwacht de inspectie dat scholen daaraan 'voldoen'. Daarom organiseren we vanuit het Nederlands Centrum voor Curriculumstudies een speciale masterclass hierover.
sfeerfoto: /masterclasses/kerndoelen po plaatje.png
body: |-
  Tijdens deze dag formuleren we antwoorden op vragen zoals:

  - Wat kun - en moet - je nou eigenlijk (niet) met die kerndoelen? 
  - Welke boodschap gaat ervan uit/hoe moeten we ze duiden?
  - Hoe kun je de kerndoelen in historisch perspectief plaatsen?
  - Waarom geven ze het nationaal curriculum elders anders vorm?

  Na afloop van de masterclass ben je weer helemaal 'up to date' en kun je een verantwoord plan formuleren waarin je uiteenzet hoe je je met je eigen school tot de nieuwe kerndoelen wil gaan verhouden.

  Deze masterclass wordt verzorgd door onze hoofddocenten Sarah Bergsen, Tjip de Jong & Erik Meester.

  # **Programmadoelen**

  ·       De schoolleider kan uitleggen wat de actualisatie van de kerndoelen betekent voor het primair onderwijs en waarom deze ontwikkeling relevant is voor curriculumontwikkeling, onderwijsinhoud en kwaliteitszorg.

  ·       De schoolleider kan de nieuwe kerndoelen interpreteren als richtinggevende curriculumdoelen en deze verbinden met de eigen schoolvisie, het bestaande onderwijsaanbod en de maatschappelijke opdracht van de school.

  ·       De schoolleider kan analyseren in hoeverre het huidige schoolcurriculum aansluit bij de nieuwe kerndoelen, en kan daarbij sterke onderdelen, hiaten, dubbelingen en ontwikkelvragen benoemen.

  ·       De schoolleider kan onderscheid maken tussen landelijke curriculumdoelen, methode-inhouden, schooleigen keuzes en concrete lespraktijk, en kan dit onderscheid gebruiken om het gesprek met het team te verdiepen.

  ·       De schoolleider kan leidinggeven aan een gezamenlijk leerproces binnen de school dat uitmondt in concrete vervolgstappen voor het toepassen van de nieuwe kerndoelen.

  ·       De schoolleider kan een beknopt actieplan formuleren waarin zichtbaar wordt hoe de school de nieuwe kerndoelen verbindt met curriculumontwikkeling, teamontwikkeling, kwaliteitszorg en onderwijskundig leiderschap.
