title: Nieuwe kerndoelen toepassen
date: 28 september 2026
location: Vught, Bij-Albert
slug: nieuwe-kerndoelen-toepassen
cost: € 395,-
level: Post-hbo
accreditation: In aanvraag bij Ascenda, aantal toegewezen punten volgt z.s.m.
body: |-
  In 2025 zijn de nieuwe kerndoelen voor het primair onderwijs gepubliceerd en vanaf 2031 verwacht de inspectie dat scholen daaraan voldoen. Maar wat kun je nou eigenlijk met die kerndoelen? Dat is de centrale vraag waarop we in deze masterclass een geïnformeerd antwoord proberen te formuleren.

  Deze masterclass wordt verder verzorgd door onze hoofddocenten Sarah Bergsen, Tjip de Jong & Erik Meester.
