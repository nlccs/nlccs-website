intro: Curriculumontwikkelingen worden vaak groots aangekondigd en uitgeschreven, op basis van prachtige idealen. Maar in de praktijk is curriculumontwikkeling vooral concreet handwerk dat moet worden gerealiseerd in de alledaagse (vaak turbulente en weerbarstige) onderwijspraktijk. Hoe zorg je ervoor dat leraren in in staat zijn tot de nodige gedragsveranderingen? Dat is de centrale vraag waarop we in deze masterclass een geïnformeerd antwoord proberen te formuleren.
sfeerfoto: /masterclasses/2024-04-17_josh-book-blog3.png
body: Hulp krijgen we van gastdocent Tim van der Meulen, begeleider van Expertisescholen en gespecialiseerd op het gebied van responsief coachen. Deze masterclass wordt verder verzorgd door onze hoofddocenten Sarah Bergsen, Tjip de Jong & Erik Meester.
