intro: De razendsnelle ontwikkelingen omtrent generatieve AI (GenAI) hebben veel invloed op de arbeidsmarkt en samenleving. Maar hoe heeft het primair onderwijs zich daartoe te verhouden? Dat is de centrale vraag waarop we in deze masterclass een geïnformeerd antwoord proberen te formuleren.
sfeerfoto: /masterclasses/Felienne-Hermans.jpg
body: |-
  Hulp krijgen we  van gastdocent prof. dr. Felienne Hermans, hoogleraar Vakdidactiek van de Informatica aan de Vrije Universiteit Amsterdam en docent informatica aan de Open Schoolgemeenschap Bijlmer. Deze masterclass wordt verder verzorgd door onze hoofddocenten Sarah Bergsen, Tjip de Jong & Erik Meester.

  **Programmadoelen**

  ·       De schoolleider kan uitleggen wat GenAI is, hoe generatieve AI-systemen in hoofdlijnen werken en waarom deze ontwikkeling relevant is voor het curriculum, de didactiek en de maatschappelijke opdracht van de school.

  ·       De schoolleider kan vanuit een theoretisch fundament en een gedragen onderwijsvisie richting geven aan het gesprek over GenAI, waarbij onderscheid wordt gemaakt tussen instrumenteel gebruik van AI, AI-geletterdheid en bredere vormingsvragen rond technologie, menselijkheid, verantwoordelijkheid en leren.

  ·       De schoolleider kan analyseren welke kansen, risico’s en dilemma’s GenAI oproept voor de eigen schoolpraktijk, waaronder vragen rond kansengelijkheid, privacy, betrouwbaarheid van informatie, professionele autonomie, toetsing, schrijfvaardigheid, kennisontwikkeling en het vakmanschap van leraren.

  ·       De schoolleider kan de ontwikkeling rond GenAI verbinden met curriculumontwikkeling en digitale geletterdheid, en daarbij onderbouwen wat leerlingen moeten leren begrijpen, kunnen en beoordelen in een samenleving waarin AI-systemen steeds zichtbaarder aanwezig zijn.

  ·       De schoolleider kan leidinggeven aan een gezamenlijk leerproces binnen de school dat uitmondt in concrete afspraken en interventies voor verantwoord, doordacht en curriculumgericht gebruik van GenAI.

  ·       De schoolleider kan een beknopt actieplan formuleren waarin zichtbaar wordt hoe de school GenAI verbindt met curriculumontwikkeling, digitale geletterdheid, professionele ontwikkeling van leraren en onderwijskundig leiderschap.
