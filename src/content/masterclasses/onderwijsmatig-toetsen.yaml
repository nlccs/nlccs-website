body: |-
  In het Nederlandse onderwijslandschap zijn er grote ideologische verschillen ten aanzien van de bedoeling en inrichting van het primair onderwijs, maar waar iedereen het over eens lijkt te zijn is dat de huidige toetspraktijk moet veranderen. Wat is er mis met die toetspraktijk en hoe kan het beter? Dat is de centrale vraag waarop we in deze masterclass een geïnformeerd antwoord proberen te formuleren.

  Hulp krijgen we van gastdocent dr. Karen Heij, toetsexpert en gepromoveerd op de eindtoets basisonderwijs bezien vanuit bestuurlijk perspectief. Deze masterclass wordt verder verzorgd door onze hoofddocenten Sarah Bergsen, Tjip de Jong & Erik Meester.
