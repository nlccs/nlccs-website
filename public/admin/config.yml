backend:
  name: github
  repo: nlccs/nlccs-website
  branch: main
  # OAuth is handled by a Sveltia CMS Authenticator deployed on Cloudflare Workers.
  # See setup instructions in README or ask your developer.
  base_url: https://nlccs-auth.ivar-634.workers.dev

# Media (team photos) are committed to the repo under public/team/
media_folder: public/team
public_folder: /team

collections:
  - name: masterclasses
    label: Masterclasses
    label_singular: Masterclass
    folder: src/content/masterclasses
    extension: yaml
    format: yaml
    create: true
    slug: "{{uuid}}"
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Slug (URL), name: slug, widget: string, hint: "Bepaalt de URL. Alleen kleine letters, cijfers en koppeltekens. Wijzigen hernoemt het bestand automatisch bij volgende deploy." }
      - { label: Type, name: type, widget: string, default: "Masterclass", hint: "Bijv. Masterclass, Verdiepingssessie, Workshop" }
      - { label: Datum, name: date, widget: datetime, format: YYYY-MM-DD, date_format: DD-MM-YYYY, time_format: false }
      - { label: Starttijd, name: time_start, widget: datetime, format: HH:mm, date_format: false, time_format: HH:mm, default: "09:00" }
      - { label: Eindtijd, name: time_end, widget: datetime, format: HH:mm, date_format: false, time_format: HH:mm, default: "17:00" }
      - { label: Locatie, name: location, widget: string }
      - { label: Kosten, name: cost, widget: string, required: false, default: "Nader te bepalen" }
      - { label: Niveau, name: level, widget: string, required: false, default: "Schoolleiders en leraren" }
      - { label: Studielast, name: studielast, widget: string, required: false }
      - { label: Deelnemers, name: deelnemers, widget: string, required: false }
      - { label: Accreditatie, name: accreditation, widget: string, required: false, default: "Lopend bij Ascenda" }
      - label: Aanmeldlink
        name: aanmeld_url
        widget: string
        required: false
        hint: "Volledige URL inclusief https://, bijv. https://eventbrite.com/..."
        pattern: ['^https?://.+', "Moet een geldige URL zijn die begint met http:// of https://"]
      - { label: Inleiding, name: intro, widget: text, required: false, hint: "Wordt groot weergegeven boven de sfeerfoto" }
      - label: Sfeerfoto
        name: sfeerfoto
        widget: image
        required: false
        media_folder: /public/masterclasses
        public_folder: /masterclasses
        hint: "Wordt weergegeven onder de inhoudstekst"
      - label: Inhoud
        name: body
        widget: richtext
        required: false
        buttons: [bold, italic, strikethrough, code, link, heading-three, heading-four, heading-five, heading-six, bulleted-list, numbered-list, quote]
        editor_components: [image, code-block]

  - name: leergangen
    label: Leergangen
    label_singular: Leergang
    folder: src/content/leergangen
    extension: yaml
    format: yaml
    create: true
    slug: "{{uuid}}"
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Slug (URL), name: slug, widget: string, hint: "Bepaalt de URL. Alleen kleine letters, cijfers en koppeltekens. Wijzigen hernoemt het bestand automatisch bij volgende deploy." }
      - { label: Startdatum, name: startdatum, widget: datetime, format: YYYY-MM-DD, date_format: DD-MM-YYYY, time_format: false }
      - { label: Locatie, name: location, widget: string, required: false }
      - { label: Kosten, name: cost, widget: string, required: false, default: "Nader te bepalen" }
      - { label: Niveau, name: level, widget: string, required: false, default: "Schoolleiders" }
      - { label: Studielast, name: studielast, widget: string, required: false }
      - { label: Deelnemers, name: deelnemers, widget: string, required: false }
      - { label: Accreditatie, name: accreditation, widget: string, required: false, default: "Lopend bij Ascenda" }
      - label: Aanmeldlink
        name: aanmeld_url
        widget: string
        required: false
        hint: "Volledige URL inclusief https://"
        pattern: ['^https?://.+', "Moet een geldige URL zijn die begint met http:// of https://"]
      - { label: Inleiding, name: intro, widget: text, required: false, hint: "Wordt groot weergegeven boven de sfeerfoto" }
      - label: Sfeerfoto
        name: sfeerfoto
        widget: image
        required: false
        media_folder: /public/masterclasses
        public_folder: /masterclasses
      - label: Omschrijving
        name: body
        widget: richtext
        required: false
        buttons: [bold, italic, strikethrough, code, link, heading-three, heading-four, heading-five, heading-six, bulleted-list, numbered-list, quote]
        editor_components: [image, code-block]

  - name: team
    label: Team
    label_singular: Teamlid
    folder: src/content/team
    extension: yaml
    format: yaml
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Volgorde, name: order, widget: number }
      - { label: Naam, name: name, widget: string }
      - label: Foto
        name: photo
        widget: image
        hint: "Wordt opgeslagen in public/team/"
      - { label: Biografie, name: bio, widget: text }
      - { label: E-mailadres, name: email, widget: string, required: false, hint: "Wordt weergegeven als klikbare link op de website." }
